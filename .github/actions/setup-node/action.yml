name: 'Setup Node.js'
description: 'Centralized setup for Node.js, pnpm, and dependencies'
inputs:
  node-version:
    description: 'Node.js version'
    required: false
    default: '22.x'
  lfs:
    description: 'Whether to enable LFS'
    required: false
    default: 'false'
  ref:
    description: 'Git reference to checkout'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - uses: actions/checkout@v5
      with:
        lfs: ${{ inputs.lfs }}
        ref: ${{ inputs.ref }}

    - uses: pnpm/action-setup@v5
      with:
        run_install: false

    - uses: actions/setup-node@v5
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'pnpm'

    - name: Install dependencies
      shell: bash
      run: pnpm install

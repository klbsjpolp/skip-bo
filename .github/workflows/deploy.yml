name: Deploy

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      minimum_supported_version:
        description: 'Optional minimum supported web version for installed PWAs'
        type: string
        required: false
        default: ''

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write
  pages: write
  id-token: write

# The backend relay server is deployed separately from the realtime-infra repo
# (https://github.com/klbsjpolp/realtime-infra). This workflow only builds and
# deploys the web frontend, which connects to the shared server via the
# VITE_SKIPBO_API_URL secret.

jobs:
  gate:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - run: echo "Gate passed"

  release:
    needs: gate
    if: github.event_name == 'workflow_dispatch' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    outputs:
      release_sha: ${{ steps.release_meta.outputs.release_sha }}
      release_tag: ${{ steps.release_meta.outputs.release_tag }}
      release_version: ${{ steps.release_meta.outputs.release_version }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main # Garantir qu'on est sur main pour la release
          fetch-depth: 0 # Full history is required for conventional-commit version calculation
          token: ${{ secrets.RELEASE_PUSH_TOKEN }}
      - uses: ./.github/actions/setup-node

      - name: Configure git author
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create release commit and tag
        shell: bash
        run: pnpm release -- --no-verify

      - name: Push release commit and tag
        shell: bash
        run: git push --follow-tags origin HEAD:main

      - name: Capture release metadata
        id: release_meta
        shell: bash
        run: |
          echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "release_tag=$(git describe --tags --abbrev=0)" >> "$GITHUB_OUTPUT"
          echo "release_version=$(node -p 'require(\"./package.json\").version')" >> "$GITHUB_OUTPUT"

  build-frontend:
    needs: [gate, release]
    if: needs.release.result == 'success'
    runs-on: ubuntu-latest
    environment: aws-prod
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.release.outputs.release_sha }}
      - uses: ./.github/actions/setup-node

      - uses: actions/configure-pages@v6

      - name: Generate runtime config
        shell: bash
        env:
          API_BASE_URL: ${{ secrets.VITE_SKIPBO_API_URL }}
          APP_VERSION: ${{ needs.release.outputs.release_tag }}
          MINIMUM_SUPPORTED_VERSION: ${{ inputs.minimum_supported_version || vars.PWA_MINIMUM_SUPPORTED_VERSION }}
        run: |
          node <<'EOF'
          const fs = require('node:fs');

          const payload = {
            apiBaseUrl: process.env.API_BASE_URL ?? '',
            appVersion: process.env.APP_VERSION ?? '',
            minimumSupportedVersion: process.env.MINIMUM_SUPPORTED_VERSION ?? '',
          };

          fs.writeFileSync('apps/web/public/runtime-config.json', `${JSON.stringify(payload)}\n`);
          EOF

      - name: Build web app
        run: pnpm --filter @skipbo/web build
        env:
          NODE_ENV: production
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: pierre-luc
          SENTRY_PROJECT: skip-bo-frontend
          VITE_APP_VERSION: ${{ needs.release.outputs.release_tag }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./apps/web/dist

  deploy-pages:
    needs: [release, build-frontend]
    if: needs.release.result == 'success' && needs.build-frontend.result == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  github-release:
    needs: [release, deploy-pages]
    if: needs.release.result == 'success' && (needs.deploy-pages.result == 'success' || needs.deploy-pages.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release.outputs.release_tag }}
          name: ${{ needs.release.outputs.release_tag }}
          generate_release_notes: true

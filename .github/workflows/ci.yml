name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  check-paths:
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infra:
              - 'infra/**'
              - 'apps/realtime-api/**'
              - 'packages/game-core/**'
              - 'packages/multiplayer-protocol/**'

  workspace:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: ./.github/actions/setup-node
        with:
          node-version: ${{ matrix.node-version }}
          lfs: true

      - name: Run lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Run typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  ui:
    runs-on: macos-latest

    steps:
      - uses: ./.github/actions/setup-node
        with:
          lfs: true

      - name: Install Playwright browser
        run: pnpm --filter @skipbo/web exec playwright install chromium

      - name: Run UI regression tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: apps/web/test-results

  opentofu:
    needs: check-paths
    if: needs.check-paths.outputs.infra == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: ./.github/actions/setup-node

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_wrapper: false

      - name: Build realtime API bundle
        run: pnpm --filter @skipbo/realtime-api build

      - name: Check OpenTofu formatting
        run: pnpm tofu:fmt

      - name: Validate OpenTofu offline config
        run: pnpm --dir infra/terraform validate:offline:prod

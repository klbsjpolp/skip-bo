name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

jobs:
  workspace:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Test the engines floor (22.x) and the current LTS (24.x).
        node-version: [22.x, 24.x]

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - uses: ./.github/actions/setup-node
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run lint
        run: pnpm lint

      # Coverage output is Node-independent, so only instrument on the floor
      # version; the newer node just verifies the suite passes.
      - name: Run tests (coverage on 22.x)
        run: ${{ matrix.node-version == '22.x' && 'pnpm test:coverage' || 'pnpm test' }}

      - name: Upload coverage to Codecov
        if: matrix.node-version == '22.x'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          files: |
            packages/game-core/coverage/lcov.info
            packages/skipbo-runtime/coverage/lcov.info
            apps/web/coverage/lcov.info

      - name: Run typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  ui:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - uses: ./.github/actions/setup-node

      - name: Install Playwright browser
        run: pnpm --filter @skipbo/web exec playwright install chromium

      - name: Run UI regression tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/web/playwright-report

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results
          path: apps/web/test-results

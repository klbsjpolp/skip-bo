name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  workspace:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Run typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  ui:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Use Node.js 22.x
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browser
        run: pnpm --filter @skipbo/web exec playwright install chromium

      - name: Run UI regression tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: apps/web/test-results

  opentofu:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Use Node.js 22.x
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          cache: 'pnpm'

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_wrapper: false

      - name: Install dependencies
        run: pnpm install

      - name: Build realtime API bundle
        run: pnpm --filter @skipbo/realtime-api build

      - name: Check OpenTofu formatting
        run: pnpm tofu:fmt

      - name: Initialize OpenTofu without backend
        run: tofu -chdir=infra/terraform/envs/prod init -backend=false

      - name: Validate OpenTofu
        run: pnpm tofu:validate

      - name: Create offline OpenTofu plan
        run: tofu -chdir=infra/terraform/envs/prod plan -input=false -lock=false -refresh=false

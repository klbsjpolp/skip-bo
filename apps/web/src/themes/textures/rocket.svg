<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 164 44" width="164" height="44">
  <defs>
    <!-- Exhaust plume: transparent left → faint cyan → warm cream → orange right -->
    <!-- Matches ::before inset: 28% 44% 28% 0 with gradient(90deg, transparent 0%, ..., #f1954d 100%) -->
    <linearGradient id="eg" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%"   stop-color="#7fd4d7" stop-opacity="0"/>
      <stop offset="18%"  stop-color="#7fd4d7" stop-opacity="0.04"/>
      <stop offset="36%"  stop-color="#7fd4d7" stop-opacity="0.2"/>
      <stop offset="66%"  stop-color="#fff4d8" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#f1954d" stop-opacity="0.94"/>
    </linearGradient>

    <!-- Rocket body: cyan thrust cone → orange fuselage → cream → white nose -->
    <!-- Matches ::after gradient(90deg, #7fd4d7 0 18%, #f1954d 18% 72%, #ffd59d 72% 86%, #fcf4e8 86% 100%) -->
    <linearGradient id="bg" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%"     stop-color="#7fd4d7"/>
      <stop offset="18%"    stop-color="#7fd4d7"/>
      <stop offset="18.01%" stop-color="#f1954d"/>
      <stop offset="72%"    stop-color="#f1954d"/>
      <stop offset="72.01%" stop-color="#ffd59d"/>
      <stop offset="86%"    stop-color="#ffd59d"/>
      <stop offset="86.01%" stop-color="#fcf4e8"/>
      <stop offset="100%"   stop-color="#fcf4e8"/>
    </linearGradient>

    <filter id="exhaust-blur" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>

    <filter id="body-glow" x="-40%" y="-100%" width="220%" height="300%">
      <feDropShadow dx="0" dy="0" stdDeviation="0.5" flood-color="white"        flood-opacity="0.10"/>
      <feDropShadow dx="0" dy="0" stdDeviation="3"   flood-color="#7fd4d7"      flood-opacity="0.16"/>
      <feDropShadow dx="0" dy="0" stdDeviation="4"   flood-color="#f1954d"      flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Exhaust plume (pill shape) -->
  <!-- Matches ::before: inset 28% 44% 28% 0 → x=0, y=12.3, w=91.8, h=19.4, border-radius:999px -->
  <rect x="0" y="12.3" width="91.8" height="19.4" rx="9.7"
        fill="url(#eg)" filter="url(#exhaust-blur)"/>

  <!-- Rocket body (hexagon) -->
  <!-- Matches ::after: inset 8% 0 8% 34% → box x=55.8, y=3.5, w=108.2, h=37 -->
  <!-- clip-path: polygon(0% 50%, 18% 18%, 70% 18%, 100% 50%, 70% 82%, 18% 82%) -->
  <!-- Computed points: left=55.8,22 | tl=75.2,10.2 | tr=131.5,10.2 | right=164,22 | br=131.5,33.8 | bl=75.2,33.8 -->
  <polygon
    points="55.8,22 75.2,10.2 131.5,10.2 164,22 131.5,33.8 75.2,33.8"
    fill="url(#bg)"
    filter="url(#body-glow)"
  />

  <!-- Porthole -->
  <!-- Matches radial-gradient(circle at 68% 50%): cx = 55.8 + 0.68×108.2 = 129.4, r = 10% of h = 3.7 -->
  <circle cx="129.4" cy="22" r="3.7" fill="white" fill-opacity="0.9"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 84" width="60" height="84">
  <!-- Step 8: tail — drawn first so the body sits in front of it.
       Anchored on the body's lower-left edge (24,68) and bottom (30,76),
       tail tip extends to (8,80). -->
  <polygon points="24,68 30,76 8,80" fill="#6c0f37"/>

  <!-- Left wing -->
  <polygon points="30,40 6,18 18,58" fill="#6c0f37"/>

  <!-- Body -->
  <polygon points="30,40 18,58 30,76" fill="#8a1f4a"/>
  <polygon points="30,40 42,58 30,76" fill="#6c0f37"/>

  <!-- Right wing -->
  <polygon points="30,40 54,18 42,58" fill="#8a1f4a"/>

  <!-- Neck -->
  <polygon points="28,40 32,40 38,16 34,16" fill="#8a1f4a"/>

  <!-- Head -->
  <polygon points="34,16 40,10 38,16" fill="#8a1f4a"/>

  <!-- Beak -->
  <polygon points="40,10 46,14 38,16" fill="#a82960"/>
</svg>

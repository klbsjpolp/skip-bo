<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420" role="img" aria-label="Midnight celestial card back">
  <defs>
    <radialGradient id="skyGlow" cx="50%" cy="42%" r="78%">
      <stop offset="0" stop-color="#1d2055"/>
      <stop offset="0.4" stop-color="#11163b"/>
      <stop offset="0.8" stop-color="#080c26"/>
      <stop offset="1" stop-color="#04061a"/>
    </radialGradient>
    <radialGradient id="centerHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#f8d58b" stop-opacity="0.22"/>
      <stop offset="0.55" stop-color="#7a6cae" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#04061a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moonGold" cx="34%" cy="28%" r="80%">
      <stop offset="0" stop-color="#fff6cf"/>
      <stop offset="0.28" stop-color="#f5cf81"/>
      <stop offset="0.65" stop-color="#c9893f"/>
      <stop offset="0.9" stop-color="#8a5524"/>
      <stop offset="1" stop-color="#4a2c14"/>
    </radialGradient>
    <radialGradient id="starGold" cx="40%" cy="35%" r="70%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.2" stop-color="#fff5d0"/>
      <stop offset="0.6" stop-color="#f6cf7e"/>
      <stop offset="0.9" stop-color="#c9893f"/>
      <stop offset="1" stop-color="#7a4a1e"/>
    </radialGradient>
    <linearGradient id="frameGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffeeb6"/>
      <stop offset="0.5" stop-color="#e9bb6e"/>
      <stop offset="1" stop-color="#a06c30"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <mask id="crescentCut">
      <rect width="300" height="420" fill="black"/>
      <circle cx="146" cy="210" r="52" fill="white"/>
      <circle cx="166" cy="210" r="50" fill="black"/>
    </mask>
    <path id="star4" d="M0 -32 C5 -10 10 -5 32 0 C10 5 5 10 0 32 C-5 10 -10 5 -32 0 C-10 -5 -5 -10 0 -32Z"/>
    <g id="cornerCurl">
      <path d="M0 0 C20 -3 34 -10 42 -24" fill="none" stroke-width="2.4"/>
      <path d="M0 0 C-3 20 -10 34 -24 42" fill="none" stroke-width="2.4"/>
      <path d="M10 10 C24 6 34 0 40 -10" fill="none" stroke-width="1.6" opacity="0.85"/>
      <path d="M10 10 C6 24 0 34 -10 40" fill="none" stroke-width="1.6" opacity="0.85"/>
      <circle cx="0" cy="0" r="2.4" fill="#fff3c7" stroke="none"/>
    </g>
    <g id="edgeMotif">
      <path d="M-26 0 C-12 -3 -5 -7 0 -16 C5 -7 12 -3 26 0 C12 3 5 7 0 16 C-5 7 -12 3 -26 0Z" fill="url(#starGold)"/>
      <path d="M-40 0 C-30 -1 -25 -4 -22 -8 M40 0 C30 -1 25 -4 22 -8 M-40 0 C-30 1 -25 4 -22 8 M40 0 C30 1 25 4 22 8" stroke="#edc47a" stroke-width="1.4" stroke-linecap="round" fill="none"/>
    </g>
  </defs>

  <!-- Card base -->
  <rect width="300" height="420" rx="22" fill="#06091e"/>
  <rect x="6" y="6" width="288" height="408" rx="20" fill="url(#skyGlow)"/>

  <!-- Faint center halo -->
  <circle cx="150" cy="210" r="135" fill="url(#centerHalo)"/>

  <!-- Background stardust (bigger, more opaque) -->
  <g fill="#f8e6bb">
    <circle cx="38" cy="72" r="1.3" opacity="0.75"/>
    <circle cx="56" cy="108" r="1.1" opacity="0.65"/>
    <circle cx="81" cy="62" r="1.5" opacity="0.8"/>
    <circle cx="108" cy="94" r="1.2" opacity="0.7"/>
    <circle cx="131" cy="66" r="1.1" opacity="0.65"/>
    <circle cx="173" cy="75" r="1.2" opacity="0.7"/>
    <circle cx="196" cy="58" r="1.4" opacity="0.78"/>
    <circle cx="223" cy="90" r="1.1" opacity="0.65"/>
    <circle cx="247" cy="118" r="1.2" opacity="0.7"/>
    <circle cx="32" cy="171" r="1.1" opacity="0.65"/>
    <circle cx="86" cy="186" r="1.1" opacity="0.65"/>
    <circle cx="214" cy="184" r="1.1" opacity="0.65"/>
    <circle cx="247" cy="172" r="1.2" opacity="0.7"/>
    <circle cx="41" cy="248" r="1.2" opacity="0.7"/>
    <circle cx="67" cy="285" r="1.1" opacity="0.65"/>
    <circle cx="236" cy="244" r="1.2" opacity="0.7"/>
    <circle cx="206" cy="292" r="1.1" opacity="0.65"/>
    <circle cx="52" cy="340" r="1.1" opacity="0.65"/>
    <circle cx="84" cy="316" r="1.4" opacity="0.78"/>
    <circle cx="112" cy="352" r="1.2" opacity="0.7"/>
    <circle cx="156" cy="332" r="1.1" opacity="0.65"/>
    <circle cx="193" cy="344" r="1.2" opacity="0.7"/>
    <circle cx="221" cy="312" r="1.1" opacity="0.65"/>
    <circle cx="252" cy="352" r="1.2" opacity="0.7"/>
    <circle cx="262" cy="68" r="1.1" opacity="0.65"/>
  </g>

  <!-- Sunburst rays radiating outward from the rings -->
  <g stroke="#edc47a" stroke-linecap="round" fill="none" opacity="0.85">
    <g stroke-width="1.6" stroke-dasharray="3 6">
      <path d="M150 130 L150 70"/>
      <path d="M150 290 L150 350"/>
      <path d="M70 210 L36 210"/>
      <path d="M230 210 L264 210"/>
      <path d="M93 153 L52 112"/>
      <path d="M207 153 L248 112"/>
      <path d="M93 267 L52 308"/>
      <path d="M207 267 L248 308"/>
    </g>
    <g stroke-width="1.2" stroke-dasharray="2 7" opacity="0.75">
      <path d="M120 138 L96 82"/>
      <path d="M180 138 L204 82"/>
      <path d="M120 282 L96 338"/>
      <path d="M180 282 L204 338"/>
      <path d="M75 180 L48 156"/>
      <path d="M225 180 L252 156"/>
      <path d="M75 240 L48 264"/>
      <path d="M225 240 L252 264"/>
    </g>
  </g>

  <!-- Concentric rings (2 strong, 1 dashed) -->
  <g fill="none">
    <circle cx="150" cy="210" r="78" stroke="url(#frameGold)" stroke-width="2.2" stroke-opacity="0.95"/>
    <circle cx="150" cy="210" r="92" stroke="#edc47a" stroke-width="1.4" stroke-dasharray="4 6" stroke-opacity="0.8"/>
    <circle cx="150" cy="210" r="110" stroke="#edc47a" stroke-width="1" stroke-dasharray="2 9" stroke-opacity="0.55"/>
  </g>

  <!-- Crescent moon (thin, centered with the star inside the inner ring) -->
  <g filter="url(#softGlow)">
    <circle cx="146" cy="210" r="52" fill="url(#moonGold)" mask="url(#crescentCut)"/>
  </g>

  <!-- Soft halo behind central star -->
  <circle cx="178" cy="210" r="20" fill="#fff5d0" opacity="0.18"/>

  <!-- Central 4-point sparkle star inside crescent's hollow -->
  <g filter="url(#softGlow)">
    <use href="#star4" fill="url(#starGold)" opacity="1" transform="translate(178 210) scale(0.78)"/>
    <use href="#star4" fill="#fff8e1" opacity="0.85" transform="translate(178 210) scale(0.38)"/>
  </g>

  <!-- Side sparkle stars (left + right at mid-height, plus pair below) -->
  <g>
    <use href="#star4" fill="url(#starGold)" opacity="1" transform="translate(60 158) scale(0.34)"/>
    <use href="#star4" fill="url(#starGold)" opacity="1" transform="translate(240 158) scale(0.34)"/>
    <use href="#star4" fill="url(#starGold)" opacity="1" transform="translate(60 262) scale(0.34)"/>
    <use href="#star4" fill="url(#starGold)" opacity="1" transform="translate(240 262) scale(0.34)"/>
  </g>

  <!-- Outer thin gold frame -->
  <g fill="none">
    <rect x="11" y="11" width="278" height="398" rx="18" stroke="url(#frameGold)" stroke-width="3" stroke-opacity="1"/>
    <rect x="19" y="19" width="262" height="382" rx="13" stroke="#edc47a" stroke-width="1.2" stroke-opacity="0.7"/>
  </g>

  <!-- Corner curls -->
  <g stroke="url(#frameGold)" stroke-linecap="round" fill="none">
    <use href="#cornerCurl" transform="translate(30 30)"/>
    <use href="#cornerCurl" transform="translate(270 30) scale(-1 1)"/>
    <use href="#cornerCurl" transform="translate(30 390) scale(1 -1)"/>
    <use href="#cornerCurl" transform="translate(270 390) scale(-1 -1)"/>
  </g>

  <!-- Mid-edge motifs (top + bottom) -->
  <g>
    <use href="#edgeMotif" transform="translate(150 30)"/>
    <use href="#edgeMotif" transform="translate(150 390)"/>
  </g>
</svg>

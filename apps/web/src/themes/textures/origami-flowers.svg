<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <symbol id="o-flower" viewBox="-50 -50 100 100">
      <polygon points="0,0 -9,-16 0,-44" fill="var(--l)"/>
      <polygon points="0,0 9,-16 0,-44" fill="var(--d)"/>
      <polygon points="0,0 -9,-16 0,-44" fill="var(--l)" transform="rotate(60)"/>
      <polygon points="0,0 9,-16 0,-44" fill="var(--d)" transform="rotate(60)"/>
      <polygon points="0,0 -9,-16 0,-44" fill="var(--l)" transform="rotate(120)"/>
      <polygon points="0,0 9,-16 0,-44" fill="var(--d)" transform="rotate(120)"/>
      <polygon points="0,0 -9,-16 0,-44" fill="var(--l)" transform="rotate(180)"/>
      <polygon points="0,0 9,-16 0,-44" fill="var(--d)" transform="rotate(180)"/>
      <polygon points="0,0 -9,-16 0,-44" fill="var(--l)" transform="rotate(240)"/>
      <polygon points="0,0 9,-16 0,-44" fill="var(--d)" transform="rotate(240)"/>
      <polygon points="0,0 -9,-16 0,-44" fill="var(--l)" transform="rotate(300)"/>
      <polygon points="0,0 9,-16 0,-44" fill="var(--d)" transform="rotate(300)"/>
      <circle r="7" fill="var(--c)"/>
      <circle r="2.5" fill="var(--p)"/>
    </symbol>
  </defs>

  <g style="--l:#a82960; --d:#6a1539; --c:#fdf8ee; --p:#d77a9a;" opacity="0.62">
    <use href="#o-flower" x="600" y="-40" width="220" height="220"/>
  </g>

  <g style="--l:#fdf8ee; --d:#efbac4; --c:#a82960; --p:#fdf8ee;" opacity="0.55">
    <use href="#o-flower" x="-30" y="60" width="160" height="160"/>
  </g>

  <g style="--l:#efbac4; --d:#d77a9a; --c:#8a1f4a; --p:#fdf8ee;" opacity="0.45">
    <use href="#o-flower" x="170" y="240" width="110" height="110"/>
  </g>

  <g style="--l:#d77a9a; --d:#8a1f4a; --c:#fdf8ee; --p:#a82960;" opacity="0.6">
    <use href="#o-flower" x="20" y="430" width="200" height="200"/>
  </g>

  <g style="--l:#f7dde3; --d:#d77a9a; --c:#8a1f4a; --p:#fdf8ee;" opacity="0.55">
    <use href="#o-flower" x="640" y="430" width="170" height="170"/>
  </g>
</svg>

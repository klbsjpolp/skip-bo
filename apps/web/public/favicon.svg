<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="fbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#24314a"/>
      <stop offset="100%" stop-color="#0d1428"/>
    </linearGradient>
    <linearGradient id="fhero" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>

  <!-- rounded slate tile -->
  <rect width="64" height="64" rx="14" fill="url(#fbg)"/>

  <!-- one card peeking behind for the card-game hint -->
  <g transform="rotate(16 32 50)">
    <rect x="19" y="13" width="26" height="38" rx="5" fill="#eef2f9" stroke="#cbd5e1" stroke-width="1"/>
  </g>

  <!-- hero Skip-Bo card -->
  <g transform="rotate(-8 32 50)">
    <rect x="18" y="12" width="28" height="40" rx="6" fill="url(#fhero)" stroke="#fde9b8" stroke-width="1"/>
    <text x="32" y="33" text-anchor="middle" dominant-baseline="central"
          font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="19" font-weight="800"
          fill="#ffffff" letter-spacing="-1">SB</text>
  </g>
</svg>
